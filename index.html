<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let W,H;
function resize(){
W=canvas.width=window.innerWidth;
H=canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const faceImg=new Image();
faceImg.src="face.png";

let selectedName="";
let gameStarted=false;
let gameEnded=false;

const names=["김묘윤","째희","쑤영","은써","써린","써율","꼰쏠","빠론","민써","채워이","쑤쑤아","쑤민","씨은","째은","파프리캌","유랴이"];
const grid=document.getElementById("nameGrid");

names.forEach(n=>{
let btn=document.createElement("div");
btn.className="name-btn";
btn.innerText=n;
btn.onclick=()=>{
btn.style.transform="scale(1.1)";
setTimeout(()=>{
selectedName=n;
document.getElementById("nameScreen").style.display="none";
startGame();
},150);
};
grid.appendChild(btn);
});

let gravity=0.6;
let friction=0.85;
let faces=[];
let particles=[];
let score=0;
let best=localStorage.getItem("bestScore")||0;
let lives=10;
let slow=1;
let shakeTime=0;
let timer=30;
let spawnCooldown=0;

const player={x:0,y:0,w:0,h:0,vx:0,vy:0,grounded:false};
const nameTag={x:0,y:0};

function init(){
player.w=W*0.09;
player.h=player.w;
player.x=W/2-player.w/2;
player.y=H*0.7-player.h;
player.vx=0;
player.vy=0;

faces=[];
particles=[];
score=0;
lives=10;
slow=1;
shakeTime=0;
timer=30;
spawnCooldown=0;
gameEnded=false;
}

function startGame(){
if(!selectedName) return;
init();
gameStarted=true;
}

function spawnFace(difficulty){
if(faces.length>14) return;
faces.push({
x:Math.random()*W,
y:-50,
size:W*(0.09+Math.random()*0.05),
vy:(3+Math.random()*2)*difficulty,
rot:Math.random()*6
});
}

function update(){
if(!gameStarted || gameEnded) return;

player.vy+=gravity;
player.x+=player.vx;
player.y+=player.vy;
player.vx*=friction;

let ground=H*0.7;
if(player.y+player.h>ground){
player.y=ground-player.h;
player.vy=0;
player.grounded=true;
}else player.grounded=false;

let difficulty=1+(30-timer)*0.05;
if(timer<=5) difficulty=3; // 마지막 5초

spawnCooldown--;
if(spawnCooldown<=0){
spawnFace(difficulty);
spawnCooldown=40/difficulty;
}

faces.forEach((f,i)=>{
f.y+=f.vy*slow;
f.rot+=0.03;
if(f.y>H){
faces.splice(i,1);
score++;
}
if(collide(player,f)){
hit();
faces.splice(i,1);
}
});

particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;
if(p.life<=0)particles.splice(i,1);
});

if(slow<1) slow+=0.02;
if(shakeTime>0) shakeTime--;
}

function collide(a,b){
return a.x<b.x+b.size &&
a.x+a.w>b.x &&
a.y<b.y+b.size &&
a.y+a.h>b.y;
}

function hit(){
if(lives<=0)return;
lives--;
slow=0.3;
shakeTime=20;
for(let i=0;i<8;i++){
particles.push({
x:player.x+player.w/2,
y:player.y+player.h/2,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:20
});
}
if(lives<=0) endGame();
}

function drawBackground(){
ctx.fillStyle="#AEE3FF";
ctx.fillRect(0,0,W,H);
ctx.fillStyle="#8ED081";
ctx.beginPath();
ctx.moveTo(0,H*0.7);
ctx.quadraticCurveTo(W/2,H*0.65,W,H*0.7);
ctx.lineTo(W,H);
ctx.lineTo(0,H);
ctx.fill();
}

function drawPlayer(){
ctx.fillStyle="#fff";
ctx.fillRect(player.x,player.y,player.w,player.h);

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(player.x,player.y+player.h,player.w,6);

drawNameTag();
}

function drawNameTag(){
nameTag.x+=((player.x+player.w/2)-nameTag.x)*0.15;
nameTag.y+=((player.y-20)-nameTag.y)*0.15;

ctx.fillStyle="rgba(255,255,255,0.9)";
ctx.beginPath();
ctx.roundRect(nameTag.x-40,nameTag.y-20,80,26,13);
ctx.fill();

ctx.fillStyle="#333";
ctx.font="12px sans-serif";
ctx.textAlign="center";
ctx.fillText(selectedName,nameTag.x,nameTag.y-2);
}

function drawFaces(){
faces.forEach(f=>{
ctx.save();
ctx.translate(f.x+f.size/2,f.y+f.size/2);
ctx.rotate(f.rot);
ctx.drawImage(faceImg,-f.size/2,-f.size/2,f.size,f.size);
ctx.restore();
});
}

function drawParticles(){
ctx.fillStyle="red";
particles.forEach(p=>{
ctx.globalAlpha=p.life/20;
ctx.fillRect(p.x,p.y,4,4);
ctx.globalAlpha=1;
});
}

function drawUI(){
ctx.fillStyle="red";
for(let i=0;i<lives;i++){
ctx.fillRect(W/2-80+i*16,20,12,12);
}
ctx.fillStyle="#000";
ctx.fillText("남은시간 "+timer,20,30);
ctx.fillText("피한개수 "+score,20,50);
}

function endGame(){
gameEnded=true;
document.getElementById("gameOver").style.display="flex";
document.getElementById("scoreText").innerText=
"30초 동안 피한 개수\n"+score+" 개";
}

function restart(){
document.getElementById("gameOver").style.display="none";
startGame();
}

function loop(){
ctx.clearRect(0,0,W,H);

if(shakeTime>0){
let dx=(Math.random()-0.5)*shakeTime;
let dy=(Math.random()-0.5)*shakeTime;
ctx.save();
ctx.translate(dx,dy);
drawBackground();
drawFaces();
drawPlayer();
drawParticles();
ctx.restore();
}else{
drawBackground();
drawFaces();
drawPlayer();
drawParticles();
}

drawUI();
update();
requestAnimationFrame(loop);
}

setInterval(()=>{
if(gameStarted && !gameEnded){
timer--;
if(timer<=0) endGame();
}
},1000);

document.getElementById("leftBtn").ontouchstart=()=>player.vx=-6;
document.getElementById("rightBtn").ontouchstart=()=>player.vx=6;
document.getElementById("leftBtn").ontouchend=()=>player.vx=0;
document.getElementById("rightBtn").ontouchend=()=>player.vx=0;
document.getElementById("jumpBtn").ontouchstart=()=>{
if(player.grounded){
player.vy=-12;
}
};

faceImg.onload=()=>{
init();
loop();
};
</script>
