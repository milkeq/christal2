<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>쑤정께임</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#AEE3FF;font-family:sans-serif;touch-action:none;}
canvas{display:block;}
#nameSelect{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;padding:20px;background:linear-gradient(#AEE3FF 70%, #8ED081 70%);overflow-y:auto;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:400px;}
.nameBtn{background:rgba(255,255,255,0.9);border-radius:18px;padding:14px;text-align:center;box-shadow:0 6px 15px rgba(0,0,0,0.1);}
.nameBtn:active{transform:scale(0.9);}
.controls{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:space-between;padding:0 25px;}
.ctrl{width:75px;height:75px;border-radius:50%;background:rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center;font-size:28px;color:white;}
.jump{width:95px;height:95px;background:linear-gradient(145deg,#4FC3FF,#2196F3);}
.ctrl:active{transform:scale(0.85);}
#result{position:absolute;inset:0;display:none;background:rgba(0,0,0,0.5);color:white;align-items:center;justify-content:center;flex-direction:column;font-size:20px;}
button{padding:12px 24px;border:none;border-radius:20px;font-size:16px;}
</style>
</head>
<body>

<div id="nameSelect">
<h3>닉네임 선택</h3>
<div class="grid" id="grid"></div>
</div>

<canvas id="game"></canvas>

<div class="controls">
<div class="ctrl" id="left">⬅</div>
<div class="ctrl jump" id="jump">●</div>
<div class="ctrl" id="right">➡</div>
</div>

<div id="result">
<div id="scoreText"></div>
<button onclick="location.reload()">다시하기</button>
</div>

<script>
const names=["김묘윤","째희","쑤영","은써","써린","써율","꼰쏠","빠론","민써","채워이","쑤쑤아","쑤민","씨은","째은","파프리캌","유랴이"];
const grid=document.getElementById("grid");
let selectedName=null;
names.forEach(n=>{
let d=document.createElement("div");
d.className="nameBtn";
d.textContent=n;
d.onclick=()=>{selectedName=n;startGame();};
grid.appendChild(d);
});

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();addEventListener("resize",resize);

const faceImg=new Image();
faceImg.src="face.png";

let player,faces=[];
let left=false,right=false;
let gravity=0.7;
let timer=30;
let score=0;
let best=localStorage.best||0;
let gameActive=false;
let spawnTick=0;

let lives=10;
let shakePower=0;

function startGame(){
document.getElementById("nameSelect").style.display="none";
player={x:W/2,y:H*0.6,vx:0,vy:0,size:W*0.1,grounded:false};
faces=[];
timer=30;
score=0;
spawnTick=0;
lives=10;
gameActive=true;
spawnWave(3); // 시작부터 약간 어렵게
}

function spawnWave(count){
for(let i=0;i<count;i++){
let size=W*0.135; // 살짝 더 크게
faces.push({
x:Math.random()*(W-size),
y:-Math.random()*120,
size:size,
speed:3.5+Math.random()*1.5,
rot:Math.random()*6,
vr:(Math.random()-0.5)*0.1
});
}
}

function hit(){
if(lives<=0)return;
lives--;
shakePower=30; // 더 강한 흔들림
if(lives<=0)setTimeout(endGame,400);
}

function update(){
if(!gameActive)return;

let progress=1-(timer/30);

// 초반부터 조금 나오고, 후반 과하지 않게
let waveAmount=2+Math.floor(progress*4);

faces.forEach(f=>f.speed=3.5+progress*4);

spawnTick++;
let interval=70-progress*25;
if(interval<30)interval=30;

if(spawnTick>interval){
spawnTick=0;
spawnWave(waveAmount);
}

// 플레이어 물리
player.vy+=gravity;
if(left) player.vx-=0.7;
if(right) player.vx+=0.7;
player.vx*=0.9;
player.x+=player.vx;
player.y+=player.vy;

// ✅ 화면 밖으로 못 나가게 고정
if(player.x<0){
player.x=0;
player.vx=0;
}
if(player.x+player.size>W){
player.x=W-player.size;
player.vx=0;
}

let ground=H*0.7;
if(player.y+player.size>ground){
player.y=ground-player.size;
player.vy=0;
player.grounded=true;
}else player.grounded=false;

// face
faces.forEach((f,i)=>{
f.y+=f.speed;
f.rot+=f.vr;

if(
player.x<f.x+f.size &&
player.x+player.size>f.x &&
player.y<f.y+f.size &&
player.y+player.size>f.y
){
faces.splice(i,1);
hit();
}

if(f.y>H+200){
faces.splice(i,1);
score++;
}
});
}

let last=0;
function loop(t){
requestAnimationFrame(loop);
if(!last)last=t;
if(t-last>1000){
if(gameActive){
timer--;
if(timer<=0)endGame();
}
last=t;
}

ctx.save();

// 강한 흔들림
if(shakePower>0){
ctx.translate((Math.random()-0.5)*shakePower,(Math.random()-0.5)*shakePower);
shakePower*=0.85;
}

ctx.clearRect(0,0,W,H);

ctx.fillStyle="#AEE3FF";
ctx.fillRect(0,0,W,H*0.7);

ctx.fillStyle="#8ED081";
ctx.beginPath();
ctx.moveTo(0,H*0.7);
ctx.quadraticCurveTo(W/2,H*0.65,W,H*0.7);
ctx.lineTo(W,H);ctx.lineTo(0,H);
ctx.fill();

faces.forEach(f=>{
ctx.save();
ctx.translate(f.x+f.size/2,f.y+f.size/2);
ctx.rotate(f.rot);
ctx.drawImage(faceImg,-f.size/2,-f.size/2,f.size,f.size);
ctx.restore();
});

if(gameActive){
ctx.fillStyle="white";
ctx.fillRect(player.x,player.y,player.size,player.size);
ctx.fillStyle="black";
ctx.font="14px sans-serif";
ctx.textAlign="center";
ctx.fillText(selectedName,player.x+player.size/2,player.y-12);
}

ctx.restore();

// 하트
const size=22;
let total=10*(size+6);
let startX=W/2-total/2;
for(let i=0;i<lives;i++){
let x=startX+i*(size+6);
ctx.fillStyle="#ff4d6d";
ctx.beginPath();
ctx.moveTo(x+size/2,25);
ctx.bezierCurveTo(x,10,x-5,25,x+size/2,40);
ctx.bezierCurveTo(x+size+5,25,x+size,10,x+size/2,25);
ctx.fill();
}

ctx.fillStyle="black";
ctx.font="18px sans-serif";
ctx.textAlign="center";
ctx.fillText("남은시간: "+timer,W/2,70);
ctx.fillText("점수: "+score,W/2,95);

update();
}
requestAnimationFrame(loop);

function endGame(){
gameActive=false;
if(score>best){best=score;localStorage.best=best;}
document.getElementById("result").style.display="flex";
document.getElementById("scoreText").innerText=
"피한 개수: "+score+"\n최고 기록: "+best;
}

document.getElementById("left").ontouchstart=()=>left=true;
document.getElementById("left").ontouchend=()=>left=false;
document.getElementById("right").ontouchstart=()=>right=true;
document.getElementById("right").ontouchend=()=>right=false;
document.getElementById("jump").ontouchstart=()=>{
if(player.grounded) player.vy=-14;
};
</script>
</body>
</html>
