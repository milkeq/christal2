<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pastel 30s Dodge</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
canvas{position:absolute;left:0;top:0;}

#nameScreen{
position:absolute;inset:0;
display:flex;flex-direction:column;
align-items:center;justify-content:flex-start;
background:linear-gradient(#AEE3FF,#CFF4FF);
overflow-y:auto;padding:20px 10px 100px 10px;
z-index:10;
}

.name-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;width:95%;max-width:500px;
}

.name-btn{
background:rgba(255,255,255,0.8);
backdrop-filter:blur(8px);
border-radius:18px;
padding:14px 10px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
font-size:14px;
transition:transform 0.15s ease;
}
.name-btn:active{transform:scale(0.9);}

#ui{position:absolute;inset:0;pointer-events:none;}

.control{
position:absolute;bottom:20px;
width:70px;height:70px;
border-radius:50%;
background:rgba(255,255,255,0.3);
backdrop-filter:blur(6px);
display:flex;align-items:center;justify-content:center;
font-size:26px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
pointer-events:auto;
transition:transform 0.1s ease;
}
.control:active{transform:scale(0.9);}
#leftBtn{left:20px;}
#rightBtn{right:20px;}

#jumpBtn{
left:50%;transform:translateX(-50%);
width:85px;height:85px;
background:linear-gradient(145deg,#7EC8FF,#4BA3F2);
color:#fff;
}

#gameOver{
position:absolute;inset:0;
display:none;
align-items:center;justify-content:center;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(4px);
}

.modal{
background:rgba(255,255,255,0.9);
border-radius:20px;
padding:25px;
text-align:center;
width:80%;max-width:300px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.restart{
margin-top:15px;
padding:10px 20px;
border-radius:15px;
background:#8ED081;
color:#fff;
font-size:14px;
}
</style>
</head>
<body>

<div id="nameScreen">
<h3>이름을 선택하세요</h3>
<div class="name-grid" id="nameGrid"></div>
</div>

<canvas id="game"></canvas>

<div id="ui">
<div id="leftBtn" class="control">⬅</div>
<div id="rightBtn" class="control">➡</div>
<div id="jumpBtn" class="control">⬆</div>
</div>

<div id="gameOver">
<div class="modal">
<div id="scoreText"></div>
<div class="restart" onclick="restart()">다시하기</div>
</div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();
addEventListener("resize",resize);

const faceImg=new Image();
faceImg.src="face.png";

let selectedName=null;
let gameStarted=false;
let gameEnded=false;

const names=["김묘윤","째희","쑤영","은써","써린","써율","꼰쏠","빠론","민써","채워이","쑤쑤아","쑤민","씨은","째은","파프리캌","유랴이"];
const grid=document.getElementById("nameGrid");

names.forEach(n=>{
let btn=document.createElement("div");
btn.className="name-btn";
btn.innerText=n;
btn.onclick=()=>{
selectedName=n;
document.getElementById("nameScreen").style.display="none";
startGame();
};
grid.appendChild(btn);
});

let gravity=0.7;
let friction=0.85;

let faces=[];
let score=0;
let timer=30;
let spawnRate=900;
let spawnInterval;
let difficultyMultiplier=1;

const player={x:0,y:0,w:0,h:0,vx:0,vy:0,grounded:false};

function init(){
player.w=W*0.09;
player.h=player.w;
player.x=W/2-player.w/2;
player.y=H*0.7-player.h;
player.vx=0;player.vy=0;
faces=[];
score=0;
timer=30;
difficultyMultiplier=1;
gameEnded=false;
}

function startGame(){
if(!selectedName) return;
init();
gameStarted=true;

spawnInterval=setInterval(spawnFace,spawnRate);

setInterval(()=>{
if(!gameStarted||gameEnded)return;
timer--;

if(timer<=0){
endGame();
}

if(timer<=5){
difficultyMultiplier=3;   // 마지막 5초 폭증
}else{
difficultyMultiplier=1 + (30-timer)*0.05;
}

},1000);
}

function spawnFace(){
if(gameEnded) return;

faces.push({
x:Math.random()*W,
y:-50,
size:W*(0.09+Math.random()*0.05),
vy:(3+Math.random()*2)*difficultyMultiplier,
rot:Math.random()*6
});
}

function update(){
if(!gameStarted||gameEnded) return;

player.vy+=gravity;
player.x+=player.vx;
player.y+=player.vy;
player.vx*=friction;

let ground=H*0.7;
if(player.y+player.h>ground){
player.y=ground-player.h;
player.vy=0;
player.grounded=true;
}else player.grounded=false;

faces.forEach((f,i)=>{
f.y+=f.vy;
f.rot+=0.03;
if(f.y>H){
faces.splice(i,1);
score++;
}
if(collide(player,f)){
faces.splice(i,1);
score=Math.max(0,score-2); // 충돌 패널티
}
});
}

function collide(a,b){
return a.x<b.x+b.size &&
a.x+a.w>b.x &&
a.y<b.y+b.size &&
a.y+a.h>b.y;
}

function draw(){
ctx.clearRect(0,0,W,H);

ctx.fillStyle="#AEE3FF";
ctx.fillRect(0,0,W,H);
ctx.fillStyle="#8ED081";
ctx.beginPath();
ctx.moveTo(0,H*0.7);
ctx.quadraticCurveTo(W/2,H*0.65,W,H*0.7);
ctx.lineTo(W,H);ctx.lineTo(0,H);
ctx.fill();

ctx.fillStyle="#fff";
ctx.fillRect(player.x,player.y,player.w,player.h);

faces.forEach(f=>{
ctx.save();
ctx.translate(f.x+f.size/2,f.y+f.size/2);
ctx.rotate(f.rot);
ctx.drawImage(faceImg,-f.size/2,-f.size/2,f.size,f.size);
ctx.restore();
});

ctx.fillStyle="#000";
ctx.fillText("남은시간 "+timer,20,30);
ctx.fillText("피한개수 "+score,20,50);
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

function endGame(){
gameEnded=true;
clearInterval(spawnInterval);
document.getElementById("gameOver").style.display="flex";
document.getElementById("scoreText").innerText=
"30초 동안 피한 개수\n"+score+" 개";
}

function restart(){
document.getElementById("gameOver").style.display="none";
startGame();
}

document.getElementById("leftBtn").ontouchstart=()=>player.vx=-7;
document.getElementById("rightBtn").ontouchstart=()=>player.vx=7;
document.getElementById("leftBtn").ontouchend=()=>player.vx=0;
document.getElementById("rightBtn").ontouchend=()=>player.vx=0;

document.getElementById("jumpBtn").ontouchstart=()=>{
if(player.grounded){
player.vy=-14;
}
};

faceImg.onload=()=>loop();
</script>
</body>
</html>
